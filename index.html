    <style>
        /* ============================================
           TEMA CHAMPAGNE & NOIR • Boutique Edition
           Background: warm beige/off-white
           Panels: crisp white / ivory
           Buttons: champagne gold metallic + black text
           Accents: pure black borders, black typography
        ============================================ */

        :root {
            --bg-base: #f5f0e8;
            /* warm beige */
            --bg-card: #fdfaf4;
            /* ivory white */
            --bg-card-alt: #f9f5ed;
            /* off-white */
            --noir: #0f0f0f;
            /* rich black */
            --noir-soft: #1c1c1c;
            --noir-muted: #3a3633;
            /* dark warm-grey */
            --noir-subtle: #6b6560;
            /* medium warm-grey */
            --border: rgba(15, 15, 15, 0.12);
            /* ultra-thin black border */
            --border-dark: rgba(15, 15, 15, 0.22);
            --champagne: #c9a227;
            /* champagne gold core */
            --champagne-lt: #e8c84e;
            --champagne-dk: #8a6d18;
        }

        body {
            background-color: var(--bg-base);
            background-image:
                radial-gradient(ellipse at 10% 10%, rgba(201, 162, 39, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 90%, rgba(201, 162, 39, 0.04) 0%, transparent 50%);
            color: var(--noir);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* --- Classic Frame (light panels) --- */
        .classic-frame {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-dark);
            box-shadow:
                0 2px 12px rgba(0, 0, 0, 0.06),
                0 1px 3px rgba(0, 0, 0, 0.04);
        }

        /* subtle top-edge shimmer */
        .classic-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(160deg, rgba(201, 162, 39, 0.22) 0%, transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* --- Inputs / Selects --- */
        input,
        select,
        textarea {
            background-color: #ffffff !important;
            border: 1px solid var(--border-dark) !important;
            color: var(--noir) !important;
            transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        input:focus,
        select:focus {
            background-color: #ffffff !important;
            border-color: var(--champagne) !important;
            box-shadow:
                0 0 0 3px rgba(201, 162, 39, 0.15),
                inset 0 1px 3px rgba(0, 0, 0, 0.05) !important;
        }

        input::placeholder {
            color: rgba(15, 15, 15, 0.35);
        }

        /* --- Champagne Gold Metallic Button --- */
        .btn-gold {
            background: linear-gradient(110deg,
                    #886918 0%,
                    #c9a227 18%,
                    #f5e4ab 40%,
                    #fff8e7 50%,
                    #f5e4ab 60%,
                    #c9a227 82%,
                    #886918 100%);
            background-size: 200% auto;
            color: #0f0f0f;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.09em;
            border: 1.5px solid rgba(15, 15, 15, 0.55);
            box-shadow:
                0 2px 8px rgba(201, 162, 39, 0.20),
                inset 0 1px 0 rgba(255, 255, 255, 0.60);
            transition: background-position 0.35s ease, box-shadow 0.2s ease, transform 0.15s ease;
        }

        .btn-gold:hover {
            background-position: right center;
            transform: translateY(-2px) scale(1.015);
            box-shadow:
                0 8px 24px rgba(201, 162, 39, 0.30),
                inset 0 1px 0 rgba(255, 255, 255, 0.70);
            border-color: rgba(15, 15, 15, 0.70);
        }

        .btn-gold:active {
            transform: scale(0.975);
            box-shadow: 0 1px 4px rgba(201, 162, 39, 0.15);
        }

        /* --- Glass / Glass-dark (repurposed to light) --- */
        .glass {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-dark);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
        }

        .glass-dark {
            position: relative;
            background: var(--bg-card-alt);
            border: 1px solid var(--border-dark);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
        }

        /* --- Scrollbar • thin champagne on cream --- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #c9a227, #e4ba4a, #c9a227);
            border-radius: 4px;
            border: 1px solid var(--bg-base);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--champagne);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(201, 162, 39, 0.4);
        }

        /* --- Headings --- */
        h1,
        h2,
        h3,
        .font-display {
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
            color: var(--noir);
        }

        /* --- Tailwind overrides for dark-mode classes used inline --- */
        /* Remap text-slate-* to dark noir tones */
        .text-slate-200 {
            color: #1c1c1c !important;
        }

        .text-slate-300 {
            color: #2e2b27 !important;
        }

        .text-slate-400 {
            color: #4a4640 !important;
        }

        .text-slate-500 {
            color: #6b6560 !important;
        }

        .text-white {
            color: #0f0f0f !important;
        }

        /* Cards that used bg-black / bg-onyx ? ivory */
        .bg-black,
        .bg-onyx-950,
        .bg-onyx-900,
        .bg-onyx-800 {
            background-color: var(--bg-card) !important;
        }

        /* border-white/* ? thin black border */
        [class*="border-white"] {
            border-color: var(--border) !important;
        }

        /* bg-white/* overlays ? very light beige */
        .bg-white\/5 {
            background-color: rgba(15, 15, 15, 0.03) !important;
        }

        .bg-white\/10 {
            background-color: rgba(15, 15, 15, 0.05) !important;
        }

        .bg-white\/20 {
            background-color: rgba(15, 15, 15, 0.08) !important;
        }

        /* Nav / header area */
        nav,
        header,
        .navbar {
            background: var(--bg-card) !important;
            border-color: var(--border-dark) !important;
        }

        /* --- Impressão A4 • Apenas Tabela de Vendas em Preto e Branco --- */
        @media print {
            @page {
                margin: 10mm 10mm;
                size: A4 portrait;
            }

            /* Reset body and html */
            html,
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                height: auto !important;
            }

            /* Hide everything by default but collapse space */
            body * {
                visibility: hidden !important;
            }

            /* Collapse height of main wrappers so they don't create blank pages */
            #root,
            .min-h-screen,
            .relative.pt-6 {
                height: 0 !important;
                min-height: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                border: none !important;
                box-shadow: none !important;
            }

            /* Revelar apenas a Área de vendas e posicionar no topo */
            .print-sales-area,
            .print-sales-area * {
                visibility: visible !important;
            }

            .print-sales-area {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100vw !important;
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
                z-index: 9999 !important;
            }

            /* Forçar Preto e Branco (sem cores) */
            .print-sales-area * {
                color: #000 !important;
                background: transparent !important;
                background-color: transparent !important;
                box-shadow: none !important;
                text-shadow: none !important;
            }

            /* Cabeçalho do relatório */
            .print-header {
                visibility: visible !important;
                display: block !important;
                height: auto !important;
                text-align: center !important;
                margin-bottom: 6mm !important;
                padding-bottom: 4mm !important;
                border-bottom: 1px solid #000 !important;
            }

            /* Espaçamento entre grupos */
            .print-sales-area .space-y-10>div+div {
                margin-top: 6mm !important;
            }

            /* Tabela principal */
            table.sales-table {
                width: 100% !important;
                border-collapse: collapse !important;
                font-size: 10px !important;
                font-family: Arial, sans-serif !important;
                table-layout: fixed !important;
                page-break-inside: auto !important;
            }

            table.sales-table tr {
                page-break-inside: avoid !important;
            }

            /* Cabeçalhos */
            table.sales-table thead tr {
                border-bottom: 2px solid #000 !important;
            }

            table.sales-table th {
                padding: 4px 5px !important;
                font-size: 8px !important;
                font-weight: 900 !important;
                text-transform: uppercase !important;
                letter-spacing: 0.05em !important;
                color: #000 !important;
                background: transparent !important;
                border: none !important;
                vertical-align: bottom !important;
            }

            /* Células */
            table.sales-table td {
                padding: 5px 5px !important;
                border: none !important;
                color: #0f0f0f !important;
                background: transparent !important;
                vertical-align: top !important;
                font-size: 9px !important;
                line-height: 1.4 !important;
                overflow: visible !important;
                white-space: normal !important;
                word-break: break-word !important;
            }

            /* Separador fino entre linhas */
            table.sales-table tbody tr {
                border-bottom: 1px solid #ccc !important;
            }

            table.sales-table tbody tr:last-child {
                border-bottom: none !important;
            }

            /* -- Larguras A4 portrait (176mm úteis aprox) -- */
            /* Cliente */
            table.sales-table th:nth-child(1),
            table.sales-table td:nth-child(1) {
                width: 17% !important;
            }

            /* Itens & Detalhes */
            table.sales-table th:nth-child(2),
            table.sales-table td:nth-child(2) {
                width: 36% !important;
            }

            /* Vendedor */
            table.sales-table th:nth-child(3),
            table.sales-table td:nth-child(3) {
                width: 9% !important;
                text-align: center !important;
            }

            /* Pagamento */
            table.sales-table th:nth-child(4),
            table.sales-table td:nth-child(4) {
                width: 24% !important;
            }

            /* Total Pago */
            table.sales-table th:nth-child(5),
            table.sales-table td:nth-child(5) {
                width: 14% !important;
                text-align: right !important;
            }

            /* Ocultar coluna de ações */
            table.sales-table th:nth-child(6),
            table.sales-table td:nth-child(6) {
                display: none !important;
            }

            /* Revelar elementos ocultos por hover */
            .opacity-0 {
                opacity: 1 !important;
            }

            [class*="translate-x"] {
                transform: none !important;
            }

            /* Remover todos os estilos decorativos das células */
            table.sales-table td * {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                border-radius: 0 !important;
            }

            /* Total Pago: texto grande e limpo */
            table.sales-table td:nth-child(5)>span:first-child {
                font-weight: 900 !important;
                font-size: 11px !important;
                padding: 0 !important;
                background: transparent !important;
                border: none !important;
                white-space: nowrap !important;
            }

            /* Remover wrapper visual azul da tabela */
            .print-sales-area>div>div>div>div[class*="bg-"] {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                overflow: visible !important;
            }

            /* Linha de data do grupo */
            .print-sales-area .flex.justify-between.items-end {
                border-left: 2px solid #000 !important;
                padding: 2px 6px !important;
                margin-bottom: 2mm !important;
                background: transparent !important;
                border-radius: 0 !important;
                box-shadow: none !important;
            }

            /* Ocultar paginação */
            .print-sales-area .flex.justify-center.items-center {
                display: none !important;
            }
        }

        .receipt-paper {
            background-color: #fdfaf4;
            color: #0f0f0f;
        }

        /* --- Performance hints --- */
        [class*="sticky"] {
            will-change: transform;
        }

        .classic-frame {
            contain: layout style;
        }

        /* Reduce blur cost on decorative elements */
        .blur-3xl {
            filter: blur(40px);
        }

        .blur-2xl {
            filter: blur(24px);
        }

        /* Disable pointer-events on decorative blobs */
        .absolute.blur-3xl,
        .absolute.blur-2xl {
            pointer-events: none;
        }

        /* GPU-accelerate modals */
        .fixed[class*="z-["] {
            will-change: opacity, transform;
            transform: translateZ(0);
        }

        /* Reduce transition cost on list items - use shorter durations */
        .space-y-10>div,
        .space-y-8>div {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        /* Prevent layout thrash on scrollable containers */
        .overflow-y-auto {
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        /* Contain list items for faster paint */
        .paginatedSale {
            contain: content;
        }

        /* Reduce animations for users who prefer it */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>

                                    const isToday = d === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
                                    const isSelected = d === currentDate.getDate() && month === currentDate.getMonth() && year === currentDate.getFullYear();
                                    const hasReminders = reminders.some(r => r.date === dateStr && !r.completed);
                                    return (
                                        <div key={d} onClick={() => setCurrentDate(new Date(year, month, d))} className={`h-28 sm:h-36 p-3 border-white/5 relative group cursor-pointer transition-all duration-300 hover:bg-white/10 ${isSelected ? 'bg-odoo-900/40 ring-inset ring-1 ring-odoo-500/30' : 'bg-white/5'}`}>

                                        </div>
                                    );

                            <div className="classic-frame rounded-[2.5rem] shadow-vision border border-white/60 p-8 flex flex-col h-full backdrop-blur-xl">
                                <div className="flex justify-between items-center mb-8">
                                    <div><h3 className="font-bold text-2xl text-slate-200 font-display">Agenda</h3><p className="text-xs text-odoo-500 font-bold uppercase tracking-wider mt-1">{currentDate.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' })}</p></div>
                                    <button onClick={() => setIsReminderModalOpen(true)} className="p-4 bg-gradient-to-br from-odoo-500 to-odoo-600 hover:from-odoo-600 hover:to-odoo-700 text-white rounded-[1.2rem] shadow-lg shadow-odoo-500/30 transition-all active-scale hover:rotate-90 duration-500"><Icons.Plus className="w-5 h-5" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-2">
                                    {dayReminders.length === 0 ? (<div className="text-center py-20 text-slate-500"><div className="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6 animate-float shadow-inner"><Icons.Calendar className="w-10 h-10 opacity-30 text-slate-600" /></div><p className="text-sm font-medium">Sem tarefas agendadas.</p></div>) : (dayReminders.map(r => (<div key={r.id} className={`p-5 rounded-[1.5rem] border transition-all duration-300 group hover:-translate-y-1 hover:shadow-lg ${r.completed ? 'bg-white/5 border-white/5 opacity-40' : 'bg-white/10 border-white/10 hover:border-odoo-500/30 shadow-sm'}`}><div className="flex items-start gap-4"><button onClick={() => toggleReminder(r.id)} className={`mt-0.5 min-w-[24px] h-[24px] rounded-full border-2 flex items-center justify-center transition-all duration-300 ${r.completed ? 'bg-odoo-600 border-odoo-600 text-white scale-110' : 'border-slate-600 hover:border-odoo-500 text-transparent'}`}><Icons.Check className="w-3.5 h-3.5" /></button><div className="flex-1"><p className={`text-sm font-medium leading-tight transition-all duration-300 ${r.completed ? 'line-through text-slate-500' : 'text-slate-300'}`}>{r.description}</p><div className="flex items-center gap-2 mt-3"><span className={`w-2 h-2 rounded-full ring-2 ring-black shadow-sm ${getTypeColor(r.type)}`}></span><span className="text-xs text-slate-500 font-mono font-bold">{r.time}</span><span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider border border-white/10 px-2 py-0.5 rounded-full bg-white/5">{r.type}</span></div></div><button onClick={() => deleteReminder(r.id)} className="opacity-0 group-hover:opacity-100 p-2 text-slate-500 hover:text-red-400 hover:bg-white/5 rounded-xl transition-all active-scale"><Icons.Trash2 className="w-4 h-4" /></button></div></div>)))}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="classic-frame rounded-[2.5rem] shadow-vision border border-white/60 p-10">
                        <h3 className="font-bold text-2xl text-slate-200 mb-8 flex items-center gap-4 font-display"><div className="p-3 bg-gradient-to-br from-odoo-500 to-odoo-600 rounded-2xl shadow-lg shadow-odoo-500/30 text-white"><Icons.CheckSquare className="w-6 h-6" /></div>Tarefas do Dia <span className="text-slate-500 font-normal text-lg ml-2 hidden sm:inline">(Rotina)</span></h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {['morning', 'afternoon', 'evening'].map(phase => (
                                <div key={phase} className="space-y-4">
                                    <div className="flex items-center gap-3 mb-6 pb-3 border-b border-white/10"><div className={`w-3 h-3 rounded-full shadow-lg animate-pulse ${phase === 'morning' ? 'bg-odoo-400 shadow-odoo-400/50' : phase === 'afternoon' ? 'bg-odoo-600 shadow-odoo-600/50' : 'bg-slate-500 shadow-slate-500/50'}`}></div><div className="font-bold text-slate-500 uppercase tracking-widest text-xs">{phase === 'morning' ? 'Início - Manhã' : phase === 'afternoon' ? 'Meio - Tarde' : 'Fim - Fechamento'}</div></div>
                                    {ROUTINE_TASKS[phase].map((task, idx) => {
                                        const isChecked = routineState[`${phase}-${idx}`];
                                        return (<div key={idx} onClick={() => toggleRoutine(phase, idx)} className={`flex items-start gap-4 p-5 rounded-[1.5rem] border transition-all cursor-pointer group duration-500 hover:scale-[1.02] active:scale-[0.98] ${isChecked ? 'bg-odoo-900/20 border-odoo-500/20 shadow-inner' : 'bg-white/5 border-white/5 hover:border-white/20 hover:shadow-lg shadow-sm'}`}><div className={`mt-0.5 min-w-[22px] h-[22px] rounded-lg border-2 flex items-center justify-center transition-all duration-300 ${isChecked ? 'bg-odoo-600 border-odoo-600 text-white rotate-0' : 'border-slate-600 bg-white/10 group-hover:border-odoo-400 -rotate-12 group-hover:rotate-0'}`}>{isChecked && <Icons.Check className="w-3.5 h-3.5" />}</div><span className={`text-sm font-medium leading-snug transition-all duration-300 ${isChecked ? 'text-odoo-600 line-through opacity-60' : 'text-slate-400 group-hover:text-slate-200'}`}>{task}</span></div>);
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                    {isReminderModalOpen && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-lg animate-in fade-in duration-500" onClick={() => setIsReminderModalOpen(false)}>
                            <div className="classic-frame rounded-[3rem] p-10 w-full max-w-sm shadow-2xl animate-in zoom-in-95 duration-500 border border-white/20 relative overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-odoo-400 to-odoo-600"></div>
                                <h3 className="font-bold text-3xl mb-8 text-slate-200 font-display text-center">Novo Lembrete</h3>
                                <div className="space-y-6">
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-3 mb-2 block tracking-wider">Descrição</label><input type="text" value={newReminder.desc} onChange={e => setNewReminder({ ...newReminder, desc: e.target.value })} className="w-full p-5 rounded-[1.5rem] text-sm outline-none font-medium" placeholder="Ex: Ligar para cliente..." autoFocus /></div>
                                    <div className="grid grid-cols-2 gap-5"><div><label className="text-[10px] font-bold text-slate-400 uppercase ml-3 mb-2 block tracking-wider">Horário</label><input type="time" value={newReminder.time} onChange={e => setNewReminder({ ...newReminder, time: e.target.value })} className="w-full p-5 rounded-[1.5rem] text-sm outline-none font-bold" /></div><div><label className="text-[10px] font-bold text-slate-400 uppercase ml-3 mb-2 block tracking-wider">Tipo</label><select value={newReminder.type} onChange={e => setNewReminder({ ...newReminder, type: e.target.value })} className="w-full p-5 rounded-[1.5rem] text-sm outline-none font-medium"><option value="Geral">Geral</option><option value="Ligação">Ligação</option><option value="Reunião">Reunião</option><option value="Cobrança">Cobrança</option></select></div></div>
                                    <div className="flex gap-4 pt-6"><button onClick={() => setIsReminderModalOpen(false)} className="flex-1 p-5 bg-white/5 text-slate-400 rounded-[2rem] font-bold hover:bg-white/10 transition-colors active-scale">Cancelar</button><button onClick={handleAddReminder} className="flex-1 btn-gold rounded-[2rem] font-bold shadow-vision transition-all active-scale">Salvar</button></div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DateInput = ({ value, onChange, required, className, placeholder }) => {
            const [inputType, setInputType] = useState('text');
            return (<div className="relative w-full group"><input type={inputType} required={required} value={inputType === 'text' && value ? formatDateBR(value) : value} onChange={onChange} onFocus={(e) => { setInputType('date'); if (e.target.showPicker) e.target.showPicker(); }} onBlur={() => setInputType('text')} className={`transition-all duration-300 input-focus-effect ${className}`} placeholder={placeholder || "dd/mm/aaaa"} />{inputType === 'text' && (<div className="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 group-hover:text-odoo-500 transition-colors"><Icons.Calendar className="w-5 h-5" /></div>)}</div>);
        };

        const maskCPF = (value) => value.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})/, '$1-$2').replace(/(-\d{2})\d+?$/, '$1');
        const maskPhone = (value) => value.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d{5})(\d{4})/, '$1-$2').slice(0, 15);
        const maskDateStrict = (value) => value.replace(/\D/g, '').replace(/(\d{2})(\d)/, '$1/$2').replace(/(\d{2})(\d)/, '$1/$2').replace(/(\d{4})\d+?$/, '$1');
        const maskCEP = (value) => value.replace(/\D/g, '').replace(/^(\d{5})(\d)/, '$1-$2').slice(0, 9);
        const maskIMEI = (value) => value.replace(/\D/g, '').slice(0, 15);

        const ToastContainer = ({ toasts, removeToast }) => (<div className="fixed top-8 right-8 z-[200] flex flex-col gap-4 pointer-events-none">{toasts.map(toast => (<div key={toast.id} className={`pointer-events-auto flex items-center gap-5 px-8 py-6 rounded-[2rem] shadow-2xl border border-white/10 transform transition-all duration-500 animate-slide-in-right glass-dark ${toast.type === 'error' ? 'border-red-500/50' : toast.type === 'success' ? 'border-emerald-500/50' : 'border-emerald-500/50'}`}><div className={`p-3 rounded-full ${toast.type === 'error' ? 'bg-red-500/20 text-red-400' : toast.type === 'success' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-emerald-500/20 text-emerald-400'}`}>{toast.type === 'error' ? <Icons.AlertCircle className="w-6 h-6" /> : toast.type === 'success' ? <Icons.Check className="w-6 h-6" /> : <Icons.AlertCircle className="w-6 h-6" />}</div><p className="font-bold text-white text-sm tracking-wide">{toast.message}</p><button onClick={() => removeToast(toast.id)} className="text-slate-400 hover:text-white transition-colors p-2 hover:bg-white/10 rounded-xl"><Icons.X className="w-5 h-5" /></button></div>))}</div>);

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [sales, setSales] = useState([]);
            const [clients, setClients] = useState([]);
            const [settings, setSettings] = useState({ employeeName: "", currency: "R$" });
            const [toasts, setToasts] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterDate, setFilterDate] = useState(() => new Date().toISOString().split('T')[0]);
            const [filterMode, setFilterMode] = useState('daily'); // 'daily', 'monthly', 'yearly'
            const [groupBy, setGroupBy] = useState('date');
            const [currentView, setCurrentView] = useState('dashboard');
            const [clientSearchModalOpen, setClientSearchModalOpen] = useState(false);
            const [clientSearchTerm, setClientSearchTerm] = useState('');
            const [clientHistoryModalOpen, setClientHistoryModalOpen] = useState(false);
            const [clientDataModalOpen, setClientDataModalOpen] = useState(false);
            const [selectedClientForEdit, setSelectedClientForEdit] = useState(null);
            const [selectedClientHistory, setSelectedClientHistory] = useState(null);
            const [managerAuthModalOpen, setManagerAuthModalOpen] = useState(false);
            const [managerPassword, setManagerPassword] = useState('');
            const [loginModalOpen, setLoginModalOpen] = useState(false);
            const [sessionPromptOpen, setSessionPromptOpen] = useState(false);
            const [selectedUserForLogin, setSelectedUserForLogin] = useState(null);
            const [loginPasswordInput, setLoginPasswordInput] = useState('');
            const [receiptModalOpen, setReceiptModalOpen] = useState(false);
            const [currentReceipt, setCurrentReceipt] = useState(null);
            const [dateLockModalOpen, setDateLockModalOpen] = useState(false);
            const [dateLockPassword, setDateLockPassword] = useState('');
            const [isBackupOpen, setIsBackupOpen] = useState(false);
            const [logoutModalOpen, setLogoutModalOpen] = useState(false);
            const [confirmSaleModalOpen, setConfirmSaleModalOpen] = useState(false);
            const [confirmChangeModalOpen, setConfirmChangeModalOpen] = useState(false);
            const [confirmClientUpdateModalOpen, setConfirmClientUpdateModalOpen] = useState(false);
            const fileInputInternalRef = useRef(null);
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(50);
            const [editingId, setEditingId] = useState(null);
            const [originalEmployeeName, setOriginalEmployeeName] = useState(null);
            const [date, setDate] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; });
            const [isDateLocked, setIsDateLocked] = useState(true);
            const [clientName, setClientName] = useState('');
            const [clientCpf, setClientCpf] = useState('');
            const [clientPhone, setClientPhone] = useState('');
            const [clientEmail, setClientEmail] = useState('');
            const [clientDob, setClientDob] = useState('');
            const [clientAddress, setClientAddress] = useState('');
            const [clientNumber, setClientNumber] = useState('');
            const [clientCity, setClientCity] = useState('');
            const [clientZip, setClientZip] = useState('');
            const [clientState, setClientState] = useState('');
            const [clientNeighborhood, setClientNeighborhood] = useState('');
            const [category, setCategory] = useState('');
            const [items, setItems] = useState([]);
            const [newItemQty, setNewItemQty] = useState(1);
            const [newItemType, setNewItemType] = useState('');
            const [newItemDesc, setNewItemDesc] = useState('');
            const [newItemRam, setNewItemRam] = useState('');
            const [newItemColor, setNewItemColor] = useState('');
            const [newItemImei, setNewItemImei] = useState('');
            const [newItemFinanced, setNewItemFinanced] = useState('Não');
            const [newItemPrice, setNewItemPrice] = useState('');
            const [newItemDiscount, setNewItemDiscount] = useState('');
            const [newItemDiscountPercent, setNewItemDiscountPercent] = useState('');
            const [exchangeAction, setExchangeAction] = useState('out');
            const [paymentList, setPaymentList] = useState([]);
            const [currentPaymentMethod, setCurrentPaymentMethod] = useState('');
            const [currentPaymentType, setCurrentPaymentType] = useState('');
            const [currentPaymentAmount, setCurrentPaymentAmount] = useState('');
            const [currentInstallments, setCurrentInstallments] = useState('');
            const [clientSource, setClientSource] = useState('');
            const [paymentObservation, setPaymentObservation] = useState('');
            const [pendingAuthAction, setPendingAuthAction] = useState(null);
            const [pendingEditItem, setPendingEditItem] = useState(null);
            const [routineState, setRoutineState] = useState({});
            const [alertModalOpen, setAlertModalOpen] = useState(false);
            const [alertData, setAlertData] = useState({ message: '', phase: '' });
            const [lastAlertTime, setLastAlertTime] = useState(0);

            const [isHelpDropdownOpen, setIsHelpDropdownOpen] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [pendingOfflineSave, setPendingOfflineSave] = useState(false);
            const [birthdayAlertOpen, setBirthdayAlertOpen] = useState(false);
            const [todayBirthdays, setTodayBirthdays] = useState([]);
            const [commissionModalOpen, setCommissionModalOpen] = useState(false);
            const [monthlyChartData, setMonthlyChartData] = useState([]);

            // --- FIREBASE SYNC & AUTH ---
            useEffect(() => {
                let unsubSales = null;
                let unsubClients = null;

                const tryLogin = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (error) {
                        console.error("Erro Auth:", error);
                        if (error.code === 'auth/configuration-not-found' || error.code === 'auth/operation-not-allowed') {
                            showToast("⚠️ ATENÇÃO: Ative 'Anônimo' no Firebase Console", "error");
                        } else {
                            showToast("Erro de conexão: " + error.message, "error");
                        }
                    }
                };

                const unsubscribeAuth = auth.onAuthStateChanged(user => {
                    if (user) {
                        console.log("Conectado como:", user.uid);
                        // Paginação Firestore: carregar somente últimos SALES_WINDOW_DAYS dias
                        const cutoffDate = new Date();
                        cutoffDate.setDate(cutoffDate.getDate() - SALES_WINDOW_DAYS);
                        const cutoffStr = cutoffDate.toISOString().split('T')[0];
                        unsubSales = db.collection('vendas')
                            .where('date', '>=', cutoffStr)
                            .orderBy('date', 'desc')
                            .onSnapshot(snapshot => {
                                const loadedSales = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                setSales(loadedSales);
                            }, err => console.error("Erro sincronia vendas:", err));

                        unsubClients = db.collection('clientes').orderBy('name').onSnapshot(snapshot => {
                            const loadedClients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setClients(loadedClients);
                        }, err => console.error("Erro sincronia clientes:", err));
                    } else {
                        tryLogin();
                    }
                });
                return () => {
                    unsubscribeAuth();
                    if (unsubSales) unsubSales();
                    if (unsubClients) unsubClients();
                };
            }, []);

            // Sync rotina do dia em tempo real via Firebase
            useEffect(() => {
                const today = new Date().toISOString().split('T')[0];
                const unsub = db.collection('rotina_state').doc(today).onSnapshot(doc => {
                    if (doc.exists) setRoutineState(doc.data());
                    else setRoutineState({});
                }, err => console.error("Erro rotina:", err));
                return () => unsub();
            }, []);

            // Monitor online/offline status
            useEffect(() => {
                const handleOnline = () => {
                    setIsOnline(true);
                    showToast("Conexão restaurada! Sincronizando...", "success");
                };
                const handleOffline = () => {
                    setIsOnline(false);
                    showToast("Sem internet. Dados salvos localmente pelo Firebase Persistence.", "error");
                };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // Alerta de aniversários do dia
            useEffect(() => {
                if (clients.length === 0) return;
                const today = new Date();
                const todayMM = String(today.getMonth() + 1).padStart(2, '0');
                const todayDD = String(today.getDate()).padStart(2, '0');
                const bdays = clients.filter(c => {
                    if (!c.dob) return false;
                    // dob pode ser "YYYY-MM-DD" ou "DD/MM/YYYY"
                    let mm, dd;
                    if (c.dob.includes('-')) {
                        const parts = c.dob.split('-');
                        mm = parts[1]; dd = parts[2];
                    } else if (c.dob.includes('/')) {
                        const parts = c.dob.split('/');
                        dd = parts[0]; mm = parts[1];
                    }
                    return mm === todayMM && dd === todayDD;
                });
                if (bdays.length > 0) {
                    setTodayBirthdays(bdays);
                    setBirthdayAlertOpen(true);
                }
            }, [clients]);

            // Calcular dados do gráfico comparativo mês a mês (últimos 6 meses)
            useEffect(() => {
                const now = new Date();
                const chartData = [];
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const yr = d.getFullYear();
                    const mo = d.getMonth();
                    const monthSales = sales.filter(s => {
                        if (!s.date) return false;
                        const sd = new Date(s.date + 'T00:00:00');
                        return sd.getFullYear() === yr && sd.getMonth() === mo;
                    });
                    const monthNames = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
                    chartData.push({
                        label: monthNames[mo] + "/" + String(yr).slice(-2),
                        total: monthSales.reduce((acc, s) => acc + (s.amountPaid || s.amount || 0), 0),
                        count: monthSales.filter(s => (s.amountPaid || s.amount) > 0).length,
                    });
                }
                setMonthlyChartData(chartData);
            }, [sales]);

            // Salvar configurações locais
            useEffect(() => {
                const st = localStorage.getItem('vendas_settings_v14');
                if (st) {
                    const p = JSON.parse(st);
                    setSettings(p);
                    if (p.employeeName) {
                        setSelectedUserForLogin(p.employeeName);
                        setSessionPromptOpen(true);
                    }
                }
            }, []);
            useEffect(() => localStorage.setItem('vendas_settings_v14', JSON.stringify(settings)), [settings]);

            const toggleRoutine = useCallback((category, index) => {
                const key = `${category}-${index}`;
                const today = new Date().toISOString().split('T')[0];
                const newVal = !routineState[key];
                db.collection('rotina_state').doc(today).set({ [key]: newVal }, { merge: true });
            }, [routineState]);

            const playAlertSound = useCallback(() => { try { new Audio('speech_1771176567518.mp3').play().catch(e => console.error(e)); } catch (e) { console.error(e); } }, []);

            useEffect(() => {
                if (!isLoggedIn) return;
                const checkAlerts = () => {
                    const now = new Date();
                    const currentMinutes = now.getHours() * 60 + now.getMinutes();
                    if (Date.now() - lastAlertTime < 15 * 60 * 1000) return;

                    let shouldTrigger = false, phaseName = "";
                    const phases = [
                        { name: "Início - Manhã", start: 570, end: 780, key: "morning" },
                        { name: "Meio - Tarde", start: 810, end: 990, key: "afternoon" },
                        { name: "Fim - Fechamento", start: 1020, end: 1110, key: "evening" }
                    ];

                    for (const p of phases) {
                        if (currentMinutes >= p.start && currentMinutes <= p.end) {
                            if (!ROUTINE_TASKS[p.key].every((_, i) => routineState[`${p.key}-${i}`])) {
                                shouldTrigger = true; phaseName = p.name; break;
                            }
                        }
                    }

                    if (shouldTrigger) {
                        setAlertData({ phase: phaseName, message: `(${settings.employeeName}) Não esqueça de completar suas tarefas diárias\n${phaseName}\nExiste Pendências!` });
                        setAlertModalOpen(true);
                        setLastAlertTime(Date.now());
                        playAlertSound();
                    }
                };
                const interval = setInterval(checkAlerts, 60000);

            const handleImportBackup = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const readFile = (file) => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => { try { resolve(JSON.parse(event.target.result)); } catch (err) { reject(err); } };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });

                try {
                    const loadedDataList = await Promise.all(files.map(file => readFile(file)));
                    const allOps = [];

                    loadedDataList.forEach(data => {
                        if (data.sales && Array.isArray(data.sales)) {
                            data.sales.forEach(s => allOps.push({ col: 'vendas', doc: s.id, data: s }));
                        }
                        if (data.clients && Array.isArray(data.clients)) {
                            data.clients.forEach(c => allOps.push({ col: 'clientes', doc: c.id, data: c }));
                        }
                    });

                    if (allOps.length === 0) {
                        showToast("Nenhum dado válido encontrado.");
                        return;
                    }

                    // Firestore batch limit is 500 writes
                    const BATCH_LIMIT = 500;
                    for (let i = 0; i < allOps.length; i += BATCH_LIMIT) {
                        const chunk = allOps.slice(i, i + BATCH_LIMIT);
                        const batch = db.batch();
                        chunk.forEach(op => {
                            const ref = db.collection(op.col).doc(op.doc);
                            batch.set(ref, op.data);
                        });

                    {!isOnline && (
                        <div className="max-w-6xl mx-auto px-6 mt-2 no-print">

                    )}
                    <div className="max-w-6xl mx-auto px-6 space-y-10 animate-fade-in-up">

                                        {(() => {
                                            const isManager = settings.employeeName === "Sabrina Almeida";

                                            const currentMonth = new Date().getMonth();
                                            const currentYear = new Date().getFullYear();

                                            // Gerente: soma TODA a equipe (próprias + vendedores)

                                                return acc + pos.reduce((sum, i) => sum + i.quantity, 0) - neg.reduce((sum, i) => sum + Math.abs(i.quantity), 0);

                                            const unitsSold = countUnits(relevantSales);

                                            // Para gerente: mostrar breakdown por vendedor
                                            const teamBreakdown = isManager ? SELLERS_LIST.map(seller => {
                                                const sellerSales = relevantSales.filter(s => s.employeeName === seller);

                                            const progress = Math.min((unitsSold / myTarget) * 100, 100);
                                            const isGoalReached = unitsSold >= myTarget;
                                            const potentialCommission = isGoalReached ? (unitsSold * COMMISSION_PER_UNIT) : 0;
                                            return (

                                                </div>
                                                <div className="flex gap-2">

                                                    </button>

                                                                        <td className="p-4 pl-6 align-top">
                                                                            <div className="font-bold text-[#0f0f0f] leading-tight mb-1" style={{ fontSize: '15px' }}>{s.clientName}</div>

                                                                                        <div className="flex-1">
                                                                                            <span className="font-bold text-[#c9a227] mr-1" style={{ fontSize: '13px' }}>{i.quantity}x</span>
                                                                                            <span className="font-semibold text-[#0f0f0f]" style={{ fontSize: '13px' }}>{i.type} • {i.description}</span>
                                                                                            <div className="flex flex-wrap gap-1 mt-0.5" style={{ fontSize: '11px', color: 'rgba(15,15,15,0.5)', fontWeight: 600, textTransform: 'uppercase' }}>
                                                                                                {i.ram_storage && <span>{i.ram_storage}</span>}
                                                                                                {i.color && <span>• {i.color}</span>}
                                                                                                {i.imei && <span className="text-[#3cb371]">• IMEI: {i.imei}</span>}

                                                                                        <div className="text-right flex-shrink-0">
                                                                                            <div className="font-bold text-[#0f0f0f]" style={{ fontSize: '14px' }}>{formatCurrency((i.unitPrice * i.quantity) - i.discount)}</div>
                                                                                            {i.discount > 0 && <div className="text-red-600 font-bold" style={{ fontSize: '11px' }}>-{formatCurrency(i.discount)}</div>}
                                                                                            {(s.category === 'Troca' || s.category === 'Devolução') && <div className="font-black uppercase" style={{ fontSize: '10px', color: i.unitPrice > 0 ? '#2e7d32' : '#c0392b' }}>{i.unitPrice > 0 ? 'Levou' : 'Devolveu'}</div>}
                                                                                        </div>
                                                                                    </div>
                                                                                </div>
                                                                            ))}</div>
                                                                        </td>
                                                                        <td className={`p-4 align-top text-center font-bold uppercase leading-snug ${s.employeeName === 'Gabriela Ferreira' ? 'text-[#c0392b]' : s.employeeName === 'Sabrina Almeida' ? 'text-[#2c3e9e]' : 'text-[#0f0f0f]/50'}`} style={{ fontSize: '11px' }}>{s.employeeName}</td>

                                                                            </div>

                                                                        <td className="p-4 align-top text-right">
                                                                            <div className="font-black text-[#0f0f0f]" style={{ fontSize: '17px', whiteSpace: 'nowrap' }}>{formatCurrency(s.amountPaid || s.amount)}</div>

                                                                        </td>

                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            ))}
                                            <div className="flex justify-center items-center gap-6 py-8 no-print"><button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className="px-6 py-3 bg-white/5 border border-white/10 rounded-[1.2rem] hover:bg-white/10 disabled:opacity-50 disabled:hover:bg-white/5 font-bold text-slate-400 hover:text-white transition-all active-scale text-sm shadow-sm">Anterior</button><span className="text-slate-400 font-bold text-xs uppercase tracking-widest bg-white/5 px-5 py-2.5 rounded-full shadow-sm border border-white/10 backdrop-blur-sm">Página {currentPage} de {totalPages}</span><button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages} className="px-6 py-3 bg-white/5 border border-white/10 rounded-[1.2rem] hover:bg-white/10 disabled:opacity-50 disabled:hover:bg-white/5 font-bold text-slate-400 hover:text-white transition-all active-scale text-sm shadow-sm">Próxima</button></div>

                                </div>
                            </>
                        )}
                    </div>
                    {clientDataModalOpen && selectedClientForEdit && (
                        <div className="fixed inset-0 z-[170] flex items-center justify-center p-4 bg-black/80 backdrop-blur-lg no-print animate-in fade-in duration-500">
                            <div className="classic-frame rounded-[3rem] p-10 w-full max-w-4xl shadow-2xl animate-in zoom-in-95 duration-500 text-slate-200 relative overflow-hidden max-h-[90vh] flex flex-col backdrop-blur-xl">
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-odoo-400 to-odoo-600"></div>
